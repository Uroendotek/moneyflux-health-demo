<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyFlux Health Platform Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="page">

  <!-- HEADER -->
  <header class="topbar">
    
    <div class="logos">

      <div class="logo-box moneyflux-box">
        <img src="./assets/logo_moneyflux_health.png" alt="MoneyFlux">
      </div>

      <div class="logo-box salud-box">
        <img src="./assets/logo_salud_digna.png" alt="Salud Digna">
      </div>

    </div>

    <div class="title-block">
      <h1>MoneyFlux Health Platform</h1>
      <p>Infraestructura · Diagnóstico · Liquidación</p>
    </div>

  </header>

  <!-- CONTENIDO -->
  <main class="desktop-layout">

    <!-- PANEL IZQUIERDO -->
    <section class="panel left">

      <div class="section-head">
        <h2>Caso clínico</h2>
        <button id="startBtn">Iniciar demo</button>
      </div>

      <div class="patient-card" id="patientCard"></div>

      <div class="studies-card" id="studiesCard"></div>

    </section>

    <!-- PANEL CENTRAL -->
    <section class="panel center">
      <h2>Flujo del paciente</h2>
      <div id="flowContainer"></div>
    </section>

    <!-- PANEL DERECHO -->
    <section class="panel right">
      <h2>Dashboard operativo</h2>
      <div id="metricsContainer"></div>
    </section>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
