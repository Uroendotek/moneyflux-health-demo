<section class="screen active" id="screen-ingreso">
  <div class="screen-header">
    <div>
      <h2>Ingreso del paciente</h2>
      <p>Captura rápida para clasificación inicial en Salud Digna.</p>
    </div>
    <div class="screen-badge badge-blue">Paso 1 de 5</div>
  </div>

  <div class="card card-form">
    <div class="card-title-row">
      <h3>Datos iniciales</h3>
      <span class="mini-status">Expediente provisional</span>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label for="pacienteNombre">Nombre del paciente</label>
        <input type="text" id="pacienteNombre" value="María López" />
      </div>

      <div class="form-group">
        <label for="pacienteEdad">Edad</label>
        <input type="number" id="pacienteEdad" value="29" min="0" max="110" />
      </div>

      <div class="form-group">
        <label for="pacienteSexo">Sexo</label>
        <select id="pacienteSexo">
          <option value="F" selected>Femenino</option>
          <option value="M">Masculino</option>
        </select>
      </div>

      <div class="form-group">
        <label for="pacienteSintoma">Síntoma principal</label>
        <input type="text" id="pacienteSintoma" value="Dificultad leve para respirar" />
      </div>

      <div class="form-group">
        <label for="categoriaRapida">Categoría rápida</label>
        <select id="categoriaRapida">
          <option value="respiratorio" selected>Respiratorio</option>
          <option value="gastrointestinal">Gastrointestinal</option>
          <option value="trauma_leve">Trauma leve</option>
          <option value="cardiovascular">Cardiovascular</option>
          <option value="metabolico">Metabólico</option>
          <option value="embarazo">Complicación del embarazo</option>
        </select>
      </div>

      <div class="form-group">
        <label for="horaIngreso">Hora de ingreso</label>
        <input type="text" id="horaIngreso" value="10:42" />
      </div>
    </div>

    <div class="quick-summary">
      <div class="summary-item">
        <span class="summary-label">Sede</span>
        <strong>Salud Digna</strong>
      </div>
      <div class="summary-item">
        <span class="summary-label">Objetivo</span>
        <strong>Clasificación inicial rápida</strong>
      </div>
      <div class="summary-item">
        <span class="summary-label">Siguiente paso</span>
        <strong>Filtro de seguridad</strong>
      </div>
    </div>

    <div class="screen-actions">
      <button class="btn btn-secondary" type="button" id="btnReiniciarIngreso">
        Reiniciar datos
      </button>

      <button class="btn btn-primary" type="button" id="btnContinuarIngreso">
        Continuar evaluación
      </button>
    </div>
  </div>
</section>
