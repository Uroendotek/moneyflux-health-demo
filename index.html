<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyFlux Health Platform Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="logos">
        <div class="logo-box moneyflux-box">
          <img src="mfh.png" alt="MoneyFlux Health Platform">
        </div>
        <div class="logo-box salud-box">
          <img src="sd.png" alt="Salud Digna">
        </div>
      </div>

      <div class="title-block">
        <h1>MoneyFlux Health Platform</h1>
        <p>Infraestructura · Diagnóstico · Liquidación</p>
      </div>
    </header>

    <main class="desktop-layout">
      <section class="panel left">
        <div class="section-head">
          <h2>Caso clínico</h2>
          <button id="startBtn">Iniciar demo</button>
        </div>

        <div class="patient-card" id="patientCard"></div>

        <div class="studies-card">
          <h3>Estudios realizados</h3>
          <div id="studiesList" class="studies-list"></div>
        </div>

        <div class="decision-card" id="decisionCard"></div>
      </section>

      <section class="panel center">
        <h2>Flujo del paciente</h2>
        <div id="flowBoard" class="flow-board"></div>
      </section>

      <section class="panel right">
        <h2>Dashboard operativo</h2>
        <div id="metricsGrid" class="metrics-grid"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
